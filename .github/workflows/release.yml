name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm package and GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # Pinned from actions/checkout@v7.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        # Pinned from actions/setup-node@v6.4.0.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        # Pinned from oven-sh/setup-bun@v2.
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.14"

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$package_version" != "$tag_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $package_version." >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Verify package contents
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          pack_json="$(npm pack --dry-run --json)"
          echo "$pack_json"
          pack_integrity="$(
            PACK_JSON="$pack_json" node -e "const payload = JSON.parse(process.env.PACK_JSON); console.log(payload[0].integrity)"
          )"
          echo "integrity=$pack_integrity" >> "$GITHUB_OUTPUT"

      - name: Check whether npm version is already published
        id: npm-version
        shell: bash
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "published_integrity=$(npm view "$package_name@$package_version" dist.integrity)" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify existing npm package matches current package
        if: steps.npm-version.outputs.published == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.pack.outputs.integrity }}" != "${{ steps.npm-version.outputs.published_integrity }}" ]]; then
            echo "npm already has this version, but its integrity differs from the current package." >&2
            echo "current:   ${{ steps.pack.outputs.integrity }}" >&2
            echo "published: ${{ steps.npm-version.outputs.published_integrity }}" >&2
            exit 1
          fi

      - name: Publish to npm
        if: steps.npm-version.outputs.published == 'false'
        run: npm publish --access public --provenance

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          latest_stable_tag="$(
            git ls-remote --tags --refs origin 'v*.*.*' \
              | sed 's#.*refs/tags/##' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n 1
          )"
          if [[ -z "$latest_stable_tag" ]]; then
            echo "No stable semver tags found on origin." >&2
            exit 1
          fi
          latest_flag="--latest=false"
          if [[ "$GITHUB_REF_NAME" == "$latest_stable_tag" ]]; then
            latest_flag="--latest"
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            if [[ "$latest_flag" == "--latest" ]]; then
              gh release edit "$GITHUB_REF_NAME" --verify-tag --latest
            else
              gh release edit "$GITHUB_REF_NAME" --verify-tag
            fi
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag "$latest_flag" --generate-notes
          fi
